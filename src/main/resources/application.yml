server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false  # 禁用 Spring Cloud 兼容性检查
    gateway:
      # 全局 CORS 配置 - 禁用
      globalcors:
        enabled: false

      # 路由配置
      routes:
        # 认证服务路由 - 不需要JWT验证
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /oauth2/**, /.well-known/**
          filters:
            - StripPrefix=2  # 去掉 /api/auth 前缀

        # 用户服务路由 - 需要JWT验证
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=2  # 去掉 /api/users 前缀

        # 客户服务路由 - 需要JWT验证
        - id: customer-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=2  # 去掉 /api/customers 前缀

        # 项目服务路由 - 需要JWT验证
        - id: project-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/projects/**
          filters:
            - StripPrefix=2  # 去掉 /api/projects 前缀

        # 任务服务路由 - 需要JWT验证
        - id: task-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/tasks/**
          filters:
            - StripPrefix=2  # 去掉 /api/tasks 前缀

        # 财务服务路由 - 需要JWT验证
        - id: finance-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/finance/**
          filters:
            - StripPrefix=2  # 去掉 /api/finance 前缀

  # 安全配置 - OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          # 指向授权服务器的 JWK 端点
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json
          # JWT 签发者验证
          issuer-uri: http://localhost:8081

# 日志配置
logging:
  level:
    com.lerong.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.reactive: DEBUG

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
  # 健康检查配置
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
